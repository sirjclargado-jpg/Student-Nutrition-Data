<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinggang Pinoy Class Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 650px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #27ae60; margin-bottom: 5px; }
        h3 { text-align: center; color: #7f8c8d; margin-top: 0; font-weight: normal; }
        
        .input-box { margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #2c3e50; }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .slider-section { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .slider-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #27ae60; }
        
        #totalBox { text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin: 20px 0; transition: 0.3s; }
        .valid { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .invalid { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }

        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #lockScreen { display: none; text-align: center; padding: 40px 20px; border: 3px solid #27ae60; border-radius: 15px; background: #f9fffb; }
        .hidden { display: none; }
        .chart-area { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🇵🇭 Pinggang Pinoy Tracker</h1>
    <h3>Science Class Data Collection</h3>

    <div id="formArea">
        <div class="input-box">
            <label>Student Full Name:</label>
            <input type="text" id="stuName" placeholder="Enter your name to start...">
        </div>

        <div class="slider-section">
            <div class="slider-header"><span style="color:#f1c40f">🍚 GO (Carbs)</span> <span id="goLabel">33%</span></div>
            <input type="range" id="goRange" min="0" max="100" value="33" oninput="calculate()">
        </div>

        <div class="slider-section">
            <div class="slider-header"><span style="color:#e67e22">🍗 GROW (Protein)</span> <span id="growLabel">17%</span></div>
            <input type="range" id="growRange" min="0" max="100" value="17" oninput="calculate()">
        </div>

        <div class="slider-section">
            <div class="slider-header"><span style="color:#27ae60">🥦 GLOW (Veggies/Fruit)</span> <span id="glowLabel">50%</span></div>
            <input type="range" id="glowRange" min="0" max="100" value="50" oninput="calculate()">
        </div>

        <div id="totalBox" class="valid">Plate Total: <span id="percentSum">100</span>%</div>
        <button id="submitBtn" onclick="saveData()">Submit My Plate</button>
    </div>

    <div id="lockScreen">
        <h2 style="color: #27ae60;">Mabuhay, <span id="savedName"></span>!</h2>
        <p>Your "Pinggang Pinoy" data has been recorded on this device.</p>
        <p style="font-size: 0.9rem; color: #666;">(Submission limit: 1 per device)</p>
    </div>

    <div class="chart-area">
        <canvas id="plateChart"></canvas>
    </div>
</div>

<script>
    const go = document.getElementById('goRange');
    const grow = document.getElementById('growRange');
    const glow = document.getElementById('glowRange');

    function calculate() {
        document.getElementById('goLabel').innerText = go.value + "%";
        document.getElementById('growLabel').innerText = grow.value + "%";
        document.getElementById('glowLabel').innerText = glow.value + "%";
        
        const sum = parseInt(go.value) + parseInt(grow.value) + parseInt(glow.value);
        const box = document.getElementById('totalBox');
        const btn = document.getElementById('submitBtn');
        
        document.getElementById('percentSum').innerText = sum;
        
        if(sum === 100) {
            box.className = "valid";
            btn.disabled = false;
            box.innerHTML = `Plate Total: ${sum}% (Balanced!)`;
        } else {
            box.className = "invalid";
            btn.disabled = true;
            box.innerHTML = `Plate Total: ${sum}% (Must be 100%)`;
        }
    }

    // Chart logic
    const ctx = document.getElementById('plateChart').getContext('2d');
    let plateChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Go (Carbs)', 'Grow (Protein)', 'Glow (Glow)'],
            datasets: [{
                data: [33, 17, 50],
                backgroundColor: ['#f1c40f', '#e67e22', '#27ae60']
            }]
        },
        options: {
            plugins: { title: { display: true, text: 'Your Current Plate Composition' } }
        }
    });

    function saveData() {
        const name = document.getElementById('stuName').value;
        if(!name) return alert("Please enter your name!");

        localStorage.setItem('pinoySubmitted', 'true');
        localStorage.setItem('pinoyName', name);
        
        showLockedState(name);
    }

    function showLockedState(name) {
        document.getElementById('formArea').classList.add('hidden');
        document.getElementById('lockScreen').style.display = 'block';
        document.getElementById('savedName').innerText = name;
        
        // Update Chart to show static final result
        plateChart.options.plugins.title.text = "Final Submitted Plate";
        plateChart.update();
    }

    window.onload = function() {
        if(localStorage.getItem('pinoySubmitted') === 'true') {
            showLockedState(localStorage.getItem('pinoyName'));
        }
    };
</script>

</body>
</html>
