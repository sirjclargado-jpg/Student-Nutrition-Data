<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinggang Pinoy: Grade Level Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #27ae60; }
        .form-section { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        select, input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        
        .slider-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #27ae60; }
        .slider-info { display: flex; justify-content: space-between; font-weight: bold; }
        
        #totalStatus { text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; margin: 15px 0; }
        .valid { background: #d4edda; color: #155724; }
        .invalid { background: #f8d7da; color: #721c24; }

        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; }
        button:disabled { background: #ccc; }

        .chart-controls { display: flex; gap: 10px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
        .view-btn { width: auto; padding: 8px 15px; background: #34495e; font-size: 0.9rem; }
        .active-view { background: #27ae60 !important; }
        
        #lockScreen { display: none; text-align: center; padding: 30px; border: 2px solid #27ae60; border-radius: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>🇵🇭 School Nutrition Hub</h1>

    <div id="formArea">
        <div class="input-group">
            <label>Researcher/Student Name:</label>
            <input type="text" id="stuName" placeholder="Enter name...">
        </div>

        <div class="input-group">
            <label>Subject's Grade Level:</label>
            <select id="gradeLevel">
                <option value="G10">Grade 10</option>
                <option value="G11">Grade 11</option>
                <option value="G12">Grade 12</option>
            </select>
        </div>

        <div class="slider-box">
            <div class="slider-info"><span>🍚 GO</span> <span id="goVal">33%</span></div>
            <input type="range" id="goRange" min="0" max="100" value="33" oninput="sync()">
        </div>
        <div class="slider-box">
            <div class="slider-info"><span>🍗 GROW</span> <span id="growVal">17%</span></div>
            <input type="range" id="growRange" min="0" max="100" value="17" oninput="sync()">
        </div>
        <div class="slider-box">
            <div class="slider-info"><span>🥦 GLOW</span> <span id="glowVal">50%</span></div>
            <input type="range" id="glowRange" min="0" max="100" value="50" oninput="sync()">
        </div>

        <div id="totalStatus" class="valid">Total: 100%</div>
        <button id="submitBtn" onclick="submitData()">Submit Data</button>
    </div>

    <div id="lockScreen">
        <h2 id="greet"></h2>
        <p>Your data has been added to the school charts.</p>
    </div>

    <div class="chart-section">
        <div class="chart-controls">
            <button class="view-btn active-view" onclick="updateChartView('all', this)">Whole School</button>
            <button class="view-btn" onclick="updateChartView('G10', this)">Grade 10</button>
            <button class="view-btn" onclick="updateChartView('G11', this)">Grade 11</button>
            <button class="view-btn" onclick="updateChartView('G12', this)">Grade 12</button>
        </div>
        <canvas id="myChart" style="margin-top: 20px;"></canvas>
    </div>
</div>

<script>
    // Data Storage (Local)
    let stats = JSON.parse(localStorage.getItem('nutritionStats')) || {
        all: { go: 0, grow: 0, glow: 0, count: 0 },
        G10: { go: 0, grow: 0, glow: 0, count: 0 },
        G11: { go: 0, grow: 0, glow: 0, count: 0 },
        G12: { go: 0, grow: 0, glow: 0, count: 0 }
    };

    function sync() {
        const go = parseInt(document.getElementById('goRange').value);
        const grow = parseInt(document.getElementById('growRange').value);
        const glow = parseInt(document.getElementById('glowRange').value);
        
        document.getElementById('goVal').innerText = go + "%";
        document.getElementById('growVal').innerText = grow + "%";
        document.getElementById('glowVal').innerText = glow + "%";

        const total = go + grow + glow;
        const status = document.getElementById('totalStatus');
        const btn = document.getElementById('submitBtn');
        
        status.innerText = "Total: " + total + "%";
        if(total === 100) {
            status.className = "valid";
            btn.disabled = false;
        } else {
            status.className = "invalid";
            btn.disabled = true;
        }
    }

    // Charting
    const ctx = document.getElementById('myChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Go', 'Grow', 'Glow'],
            datasets: [{
                label: 'Avg Percentage',
                data: [0, 0, 0],
                backgroundColor: ['#f1c40f', '#e67e22', '#27ae60']
            }]
        },
        options: { scales: { y: { max: 100, beginAtZero: true } } }
    });

    function updateChartView(level, btn) {
        // UI toggle
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active-view'));
        btn.classList.add('active-view');

        const s = stats[level];
        if(s.count === 0) {
            myChart.data.datasets[0].data = [0,0,0];
        } else {
            myChart.data.datasets[0].data = [
                (s.go / s.count).toFixed(1),
                (s.grow / s.count).toFixed(1),
                (s.glow / s.count).toFixed(1)
            ];
        }
        myChart.options.plugins.title = { display: true, text: "Averages for " + (level === 'all' ? "Whole School" : level) };
        myChart.update();
    }

    function submitData() {
        const name = document.getElementById('stuName').value;
        const level = document.getElementById('gradeLevel').value;
        if(!name) return alert("Please enter a name");

        const go = parseInt(document.getElementById('goRange').value);
        const grow = parseInt(document.getElementById('growRange').value);
        const glow = parseInt(document.getElementById('glowRange').value);

        // Update Grade Level
        stats[level].go += go;
        stats[level].grow += grow;
        stats[level].glow += glow;
        stats[level].count += 1;

        // Update Whole School
        stats.all.go += go;
        stats.all.grow += grow;
        stats.all.glow += glow;
        stats.all.count += 1;

        localStorage.setItem('nutritionStats', JSON.stringify(stats));
        localStorage.setItem('hasSubmitted', 'true');
        localStorage.setItem('userName', name);

        lock(name);
        updateChartView('all', document.querySelector('.view-btn'));
    }

    function lock(name) {
        document.getElementById('formArea').classList.add('hidden');
        document.getElementById('lockScreen').style.display = 'block';
        document.getElementById('greet').innerText = "Hello, " + name + "!";
    }

    window.onload = () => {
        if(localStorage.getItem('hasSubmitted') === 'true') lock(localStorage.getItem('userName'));
        updateChartView('all', document.querySelector('.view-btn'));
    };
</script>
</body>
</html>
