<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Macronutrient Research Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        
        .slider-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #3498db; }
        .slider-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #3498db; }
        
        #totalStatus { text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; margin: 20px 0; font-size: 1.1rem; }
        .valid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .invalid { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        button { width: 100%; padding: 18px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #2980b9; }

        #successMessage { display: none; text-align: center; padding: 40px; border: 2px dashed #27ae60; border-radius: 15px; background: #f9fffb; }
        .hidden { display: none; }
        .chart-container { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔬 School Macronutrient Hub</h1>

    <div class="grid">
        <div id="formSection">
            <form id="macroForm">
                <div class="input-group">
                    <label>Student Name (Who ate the meal):</label>
                    <input type="text" name="Name" id="stuName" placeholder="Enter full name..." required oninput="validate()">
                </div>

                <div class="input-group">
                    <label>Grade Level:</label>
                    <select name="Grade" id="gradeLevel">
                        <option value="Grade 7">Grade 7</option>
                        <option value="Grade 8">Grade 8</option>
                        <option value="Grade 9">Grade 9</option>
                        <option value="Grade 11">Grade 11</option>
                        <option value="Grade 12">Grade 12</option>
                    </select>
                </div>

                <div class="slider-box">
                    <div class="slider-header"><span>🍞 Carbohydrates</span> <span id="cL">40%</span></div>
                    <input type="range" name="Carbohydrates" id="carbs" min="0" max="100" value="40" oninput="validate()">
                </div>

                <div class="slider-box">
                    <div class="slider-header"><span>🧀 Lipids (Fats)</span> <span id="lL">30%</span></div>
                    <input type="range" name="Lipids" id="lipids" min="0" max="100" value="30" oninput="validate()">
                </div>

                <div class="slider-box">
                    <div class="slider-header"><span>🍗 Proteins</span> <span id="pL">30%</span></div>
                    <input type="range" name="Proteins" id="proteins" min="0" max="100" value="30" oninput="validate()">
                </div>

                <div id="totalStatus" class="valid">Total: 100%</div>
                <button type="submit" id="submitBtn">Send to Global Database</button>
            </form>
        </div>

        <div id="successMessage" class="hidden">
            <h2 style="color: #27ae60;">Data Recorded! ✅</h2>
            <p>Your research entry has been sent to the teacher's master sheet.</p>
            <p><em>Check the class projector to see the live results!</em></p>
        </div>

        <div class="chart-container">
            <canvas id="livePieChart"></canvas>
            <p style="text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-top: 15px;">
                Visualizing your current entry proportions.
            </p>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    // PASTE YOUR GOOGLE SCRIPT URL BELOW:
    const scriptURL = https://docs.google.com/spreadsheets/u/1/d/1xbwgbhTSTaivtvEL62YVoO_dSUmSxrjO3dpkMjvMTlA/htmlview; 
    // ---------------------

    const form = document.getElementById('macroForm');
    const cS = document.getElementById('carbs');
    const lS = document.getElementById('lipids');
    const pS = document.getElementById('proteins');

    function validate() {
        const c = parseInt(cS.value);
        const l = parseInt(lS.value);
        const p = parseInt(pS.value);
        const name = document.getElementById('stuName').value.trim();
        
        document.getElementById('cL').innerText = c + "%";
        document.getElementById('lL').innerText = l + "%";
        document.getElementById('pL').innerText = p + "%";

        const total = c + l + p;
        const status = document.getElementById('totalStatus');
        const btn = document.getElementById('submitBtn');

        status.innerText = "Total: " + total + "%";
        
        // Update Chart visually as they move sliders
        myPieChart.data.datasets[0].data = [c, l, p];
        myPieChart.update('none'); // Update without animation for smoothness

        if(total === 100 && name !== "") {
            status.className = "valid";
            btn.disabled = false;
        } else {
            status.className = "invalid";
            btn.disabled = true;
        }
    }

    // Initialize Chart
    const ctx = document.getElementById('livePieChart').getContext('2d');
    let myPieChart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Carbohydrates', 'Lipids', 'Proteins'],
            datasets: [{
                data: [40, 30, 30],
                backgroundColor: ['#3498db', '#f1c40f', '#e74c3c']
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom' },
                title: { display: true, text: 'Current Meal Composition' }
            }
        }
    });

    // Form Submission Logic
    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Uploading Data...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('successMessage').style.display = 'block';
                localStorage.setItem('formSubmitted', 'true');
            })
            .catch(error => {
                alert('Error! Check your internet connection or Script URL.', error.message);
                btn.disabled = false;
                btn.innerText = "Send to Global Database";
            });
    });

    // Lock if already submitted on this device
    window.onload = () => {
        if(localStorage.getItem('formSubmitted') === 'true') {
            document.getElementById('formSection').classList.add('hidden');
            document.getElementById('successMessage').style.display = 'block';
        }
    };
</script>

</body>
</html>
