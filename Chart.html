<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Nutrition Data Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; max-width: 700px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; }
        .input-group { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; }
        
        .slider-box { background: #f1f4f8; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        #totalTag { text-align: center; font-size: 1.2rem; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .valid { background: #d4edda; color: #155724; }
        .invalid { background: #f8d7da; color: #721c24; }

        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #receipt { display: none; text-align: center; border: 2px dashed #3498db; padding: 20px; border-radius: 15px; }
        .hidden { display: none; }
        .chart-container { margin-top: 30px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍱 Student Meal Analysis</h1>

    <div id="formSection">
        <label>Student Name:</label>
        <input type="text" id="studentName" placeholder="Enter your name...">

        <div class="slider-box">
            <div class="slider-label"><span>🍞 Carbohydrates</span> <span id="carbVal">34%</span></div>
            <input type="range" id="carbs" min="0" max="100" value="34" oninput="updateValues()">
        </div>

        <div class="slider-box">
            <div class="slider-label"><span>🍗 Proteins</span> <span id="protVal">33%</span></div>
            <input type="range" id="proteins" min="0" max="100" value="33" oninput="updateValues()">
        </div>

        <div class="slider-box">
            <div class="slider-label"><span>🥑 Fats</span> <span id="fatVal">33%</span></div>
            <input type="range" id="fats" min="0" max="100" value="33" oninput="updateValues()">
        </div>

        <div id="totalTag" class="valid">Total: <span id="totalPercent">100</span>%</div>
        <button id="submitBtn" onclick="submitData()">Submit My Results</button>
    </div>

    <div id="receipt">
        <h2 style="color: #27ae60;">Submission Confirmed!</h2>
        <p>Student: <strong id="displayName"></strong></p>
        <p>Your meal was recorded. Thank you for participating!</p>
    </div>

    <div class="chart-container">
        <canvas id="classChart"></canvas>
    </div>
</div>

<script>
    const carbSlider = document.getElementById('carbs');
    const protSlider = document.getElementById('proteins');
    const fatSlider = document.getElementById('fats');

    function updateValues() {
        document.getElementById('carbVal').innerText = carbSlider.value + "%";
        document.getElementById('protVal').innerText = protSlider.value + "%";
        document.getElementById('fatVal').innerText = fatSlider.value + "%";
        
        const total = parseInt(carbSlider.value) + parseInt(protSlider.value) + parseInt(fatSlider.value);
        const tag = document.getElementById('totalTag');
        const btn = document.getElementById('submitBtn');
        
        document.getElementById('totalPercent').innerText = total;
        
        if(total === 100) {
            tag.className = "valid";
            btn.disabled = false;
        } else {
            tag.className = "invalid";
            btn.disabled = true;
        }
    }

    // Chart Setup
    const ctx = document.getElementById('classChart').getContext('2d');
    let classChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Carbohydrates', 'Proteins', 'Fats'],
            datasets: [{
                data: [33, 33, 34],
                backgroundColor: ['#3498db', '#e67e22', '#f1c40f']
            }]
        },
        options: {
            plugins: {
                title: { display: true, text: 'Average Class Meal Composition (%)' }
            }
        }
    });

    function submitData() {
        const name = document.getElementById('studentName').value;
        if(!name) return alert("Please enter your name!");

        localStorage.setItem('hasSubmitted', 'true');
        localStorage.setItem('studentName', name);
        
        // In a real app, you'd send this to a server. 
        // Here we just toggle the UI to "Locked" mode.
        showReceipt(name);
    }

    function showReceipt(name) {
        document.getElementById('formSection').classList.add('hidden');
        document.getElementById('receipt').style.display = 'block';
        document.getElementById('displayName').innerText = name;
    }

    // Check on Load
    window.onload = function() {
        if(localStorage.getItem('hasSubmitted') === 'true') {
            showReceipt(localStorage.getItem('studentName'));
        }
    };
</script>

</body>
</html>
